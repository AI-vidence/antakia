name: Lint with pylint

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: AI-vidence/skope-rules-antakia
          ref: v0.1.2
          path: _deps/skope-rules-antakia
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: bash .github/ci/install-deps.sh
      - name: Install pylint
        run: pip install pylint
      - name: Lint source
        run: pylint src/antakia --disable=C,R || true
