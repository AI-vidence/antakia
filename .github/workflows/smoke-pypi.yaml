name: Smoke test PyPI release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install release from PyPI and smoke import
        run: |
          VER="${{ github.event.release.tag_name }}"
          VER="${VER#v}"
          echo "Smoke test antakia==${VER}"
          pip install -U pip
          pip install "numba>=0.59" "llvmlite>=0.42" --only-binary=numba,llvmlite
          pip install "skope-rules-antakia>=0.1.2" || pip install "skope-rules-antakia @ git+https://github.com/AI-vidence/skope-rules-antakia.git@v0.1.2"
          pip install "antakia==${VER}" pytest
          python -c "import antakia; print('OK', antakia.__version__)"
